name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - mvp-bootstrap

env:
  NODE_VERSION: 22
  PLAYWRIGHT_VERSION: v1.59.1

jobs:
  verify:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:${{ env.PLAYWRIGHT_VERSION }}-jammy

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Cache npm directory
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Verify container toolchain
        run: |
          node --version
          npm --version
          case "$(node --version)" in
            v${NODE_VERSION}.*) ;;
            *)
              echo "Expected Node ${NODE_VERSION}.x from the Playwright container image."
              exit 1
              ;;
          esac

      - name: Run lint, typecheck, and unit tests
        run: npm test

      - name: Run Playwright smoke tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore
