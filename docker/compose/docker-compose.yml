services:
  staging:
    image: node:22-bookworm
    user: node
    working_dir: /workspace
    command: >
      bash -lc "npm ci && npm run build && npm run start"
    ports:
      - "3000:3000"
    volumes:
      - ../../:/workspace
      - node_modules:/workspace/node_modules

volumes:
  node_modules:
